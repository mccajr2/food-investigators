spring:
  application:
    name: quickapp
  datasource:
    url: jdbc:postgresql://localhost:5432/quickapp
    username: quickapp
    password: quickapp
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

# Session TTLs for opaque Bearer sessions (remember vs session-only).
app:
  auth:
    session-ttl:
      remember: 30d
      session-only: 12h
