openapi: 3.0.3
info:
  title: Quickapp API
  version: 0.9.0
  description: >
    Contract-first API for Food Investigators. Documents family-account auth
    (email/password register and login, Bearer session tokens, /api/auth/me),
    the household food catalog (system starters + custom foods, archive, optional
    snack foods excluded from tasting sessions), tasting sessions (create, list
    upcoming, history of completed, download history PDF, get, update, cancel,
    complete with run outcomes, optional parent notes on completed sessions),
    and household Insights (aggregates + dismissible tips).
servers:
  - url: http://localhost:8080
    description: Local development
paths:
  /api/auth/register:
    post:
      operationId: register
      summary: Register a parent account and create a household
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            example:
              email: parent@example.com
              password: password1
              rememberMe: true
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
              example:
                message: Email already registered
  /api/auth/login:
    post:
      operationId: login
      summary: Sign in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              email: parent@example.com
              password: password1
              rememberMe: true
      responses:
        "200":
          description: Signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "401":
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
              example:
                message: Invalid email or password
  /api/auth/logout:
    post:
      operationId: logout
      summary: Invalidate the current Bearer session
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Signed out
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /api/auth/me:
    get:
      operationId: me
      summary: Return the current parent and household ids
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /api/foods:
    get:
      operationId: listFoods
      summary: List system starters plus this household's foods
      security:
        - bearerAuth: []
      parameters:
        - name: includeArchived
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: >
            When false (default), only active household foods are included with
            system starters. When true, archived household foods are included too.
      responses:
        "200":
          description: Foods for the current household
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FoodResponse"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
    post:
      operationId: createFood
      summary: Create a household food
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFoodRequest"
            example:
              name: Extra apple mash
              iconKey: apple
      responses:
        "201":
          description: Food created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoodResponse"
        "400":
          description: Invalid request or icon key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
              example:
                message: Invalid icon key
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "409":
          description: Name already used by a starter or active household food
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
              example:
                message: A food with that name already exists
  /api/foods/{foodId}:
    put:
      operationId: updateFood
      summary: Update a household food name and/or icon
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/FoodId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFoodRequest"
            example:
              name: Updated mash
              iconKey: sweet_potato
      responses:
        "200":
          description: Food updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoodResponse"
        "400":
          description: Invalid request or icon key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "403":
          description: System starter foods cannot be changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
              example:
                message: System starter foods cannot be changed
        "404":
          description: Food not found for this household
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "409":
          description: Name already used by a starter or active household food
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
              example:
                message: A food with that name already exists
  /api/foods/{foodId}/archive:
    post:
      operationId: archiveFood
      summary: Soft-archive a household food
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/FoodId"
      responses:
        "200":
          description: Food archived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoodResponse"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "403":
          description: System starter foods cannot be changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Food not found for this household
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /api/sessions:
    get:
      operationId: listUpcomingSessions
      summary: List planned tasting sessions for this household (earliest date first)
      description: >
        Returns sessions with status `planned`, ordered by `scheduledOn` ascending.
        Cancelled sessions are omitted.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Upcoming planned sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionResponse"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
    post:
      operationId: createSession
      summary: Create a planned tasting session with exactly two foods
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
            example:
              scheduledOn: "2026-07-20"
              foods:
                - foodId: aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaa04
                  familiarity: safe
                  variantNote: Honeycrisp
                - foodId: aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaa05
                  familiarity: truly_new
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "400":
          description: >
            Invalid request — wrong food count, missing familiarity, unknown or
            archived foods, invalid familiarity, `scheduledOn` in the past, or
            same `foodId` in both slots without two different non-blank
            `variantNote`s
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
              examples:
                pastDate:
                  value:
                    message: Scheduled date can't be in the past
                sameFoodVariants:
                  value:
                    message: Same food needs two different brand/variety notes
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "409":
          description: >
            A planned or completed session already exists for this household on
            that `scheduledOn` (cancelled sessions do not occupy the day)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
              example:
                message: A session already exists on that date
  /api/sessions/history:
    get:
      operationId: listSessionHistory
      summary: List completed tasting sessions for this household (newest first)
      description: >
        Returns sessions with status `completed`, ordered by `scheduledOn`
        descending then `updatedAt` descending. Planned and cancelled sessions
        are omitted. Each item reuses `SessionResponse` including per-food
        run outcomes. Read-only — use get by id for a single completed session.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Completed session history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionResponse"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /api/sessions/history.pdf:
    get:
      operationId: exportSessionHistoryPdf
      summary: Download completed tasting history as a PDF
      description: >
        Returns a PDF packet of sessions with status `completed`, ordered by
        `scheduledOn` descending then `updatedAt` descending (same as history
        list). Optional `from` and `to` (ISO-8601 dates) filter inclusively on
        `scheduledOn`. Omit both for the full completed history. Empty filtered
        results still return 200 with a PDF that states no sessions matched.
        Packet header is generic (product title + generated date + range) —
        no parent email or household id. Planned and cancelled sessions are
        omitted.
      security:
        - bearerAuth: []
      parameters:
        - name: from
          in: query
          required: false
          description: Inclusive start date on scheduledOn (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: false
          description: Inclusive end date on scheduledOn (YYYY-MM-DD)
          schema:
            type: string
            format: date
      responses:
        "200":
          description: PDF tasting-history packet
          headers:
            Content-Disposition:
              description: Attachment filename for the PDF download
              schema:
                type: string
                example: attachment; filename="tasting-history.pdf"
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "400":
          description: >
            Invalid request — malformed date, or `from` after `to`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /api/sessions/{sessionId}:
    get:
      operationId: getSession
      summary: Get one tasting session for this household
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Session found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Session not found for this household
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
    put:
      operationId: updateSession
      summary: Update a still-planned tasting session
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSessionRequest"
            example:
              scheduledOn: "2026-07-22"
              foods:
                - foodId: aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaa05
                  familiarity: familiar_but_new
                  variantNote: "TJ's"
                - foodId: aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaa13
                  familiarity: safe
      responses:
        "200":
          description: Session updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "400":
          description: >
            Invalid request — foods not selectable, `scheduledOn` in the past, or
            same `foodId` in both slots without two different non-blank
            `variantNote`s
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
              examples:
                pastDate:
                  value:
                    message: Scheduled date can't be in the past
                sameFoodVariants:
                  value:
                    message: Same food needs two different brand/variety notes
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Session not found for this household
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "409":
          description: >
            Session is not editable (cancelled or completed), or another planned
            or completed session already occupies the target `scheduledOn`
            (cancelled does not occupy the day; editing the same session on its
            current date is allowed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
              examples:
                notEditable:
                  value:
                    message: Session cannot be edited
                dayOccupied:
                  value:
                    message: A session already exists on that date
  /api/sessions/{sessionId}/cancel:
    post:
      operationId: cancelSession
      summary: Soft-cancel a planned tasting session
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Session cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Session not found for this household
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "409":
          description: >
            Session is not editable — already cancelled or completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
              example:
                message: Session cannot be edited
  /api/sessions/{sessionId}/complete:
    post:
      operationId: completeSession
      summary: Record run outcomes for both foods and mark the session completed
      description: >
        Persists per-food run outcomes (icon prompts + optional notes) and sets
        session status to `completed`. Only allowed while the session is still
        `planned`. Completed sessions are omitted from the default upcoming list.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteSessionRequest"
            example:
              foods:
                - position: 1
                  liked: like
                  texture: crunchy
                  temperature: cold
                  smell: like
                  whyNote: crunchy
                  changeNote: less peel
                  ateEnough: true
                - position: 2
                  liked: no
                  texture: wet
                  temperature: warm
                  ateEnough: false
      responses:
        "200":
          description: Session completed with outcomes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "400":
          description: Invalid request or outcomes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Session not found for this household
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "409":
          description: Session is cancelled or already completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
              example:
                message: Session cannot be edited
  /api/sessions/{sessionId}/parent-note:
    patch:
      operationId: updateSessionParentNote
      summary: Save or clear optional parent notes on a completed session
      description: >
        Sets `parentNote` on a `completed` tasting session (trim; blank or null
        clears to null; max 2000 characters). Planned or cancelled sessions
        return 409. Does not reopen general session update for completed rows.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateParentNoteRequest"
            example:
              parentNote: Tired after school; clinic was loud
      responses:
        "200":
          description: Parent note updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "400":
          description: Invalid request (e.g. note too long)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Session not found for this household
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "409":
          description: Session is not completed (planned or cancelled)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
              example:
                message: Parent notes can only be saved on completed sessions
  /api/insights:
    get:
      operationId: getInsights
      summary: Household tasting insights and tips
      description: >
        Aggregates completed session outcomes with snack liked/texture preferences.
        Ready when completedSessionCount >= 3; tips are empty until ready. Tips
        exclude ids this household has dismissed (up to 3 tips from a fixed catalog).
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Insights for this household
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsightsResponse"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /api/insights/tips/{tipId}/dismiss:
    post:
      operationId: dismissInsightTip
      summary: Remember dismissing an Insights tip for this household
      description: >
        Persists dismissal of a known tip id. Idempotent (repeat dismiss returns 200).
        Unknown tip id returns 400.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TipId"
      responses:
        "200":
          description: Tip dismissed (or already dismissed)
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
                    example: ok
        "400":
          description: Unknown tip id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
              example:
                message: "Unknown tip id: not_a_real_tip"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
components:
  parameters:
    FoodId:
      name: foodId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TipId:
      name: tipId
      in: path
      required: true
      schema:
        type: string
        maxLength: 64
        example: keep_going
      description: >
        Fixed tip catalog id (e.g. slow_down_truly_new, lean_into_texture,
        celebrate_ate_enough, mix_familiarity, keep_going).
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: Opaque server-side session token from register or login
  schemas:
    RegisterRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: parent@example.com
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 128
          example: password1
        rememberMe:
          type: boolean
          default: true
          description: >
            When true (default), session lasts 30 days and clients may persist the
            token. When false, session lasts 12 hours and clients must not persist
            across process death.
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: parent@example.com
        password:
          type: string
          format: password
          example: password1
        rememberMe:
          type: boolean
          default: true
          description: Same semantics as RegisterRequest.rememberMe
    AuthResponse:
      type: object
      required:
        - token
        - user
      properties:
        token:
          type: string
          description: Opaque Bearer token for subsequent authenticated calls
          example: "a1b2c3d4e5f6789012345678901234567890abcdef1234567890abcdef123456"
        user:
          $ref: "#/components/schemas/UserResponse"
    UserResponse:
      type: object
      required:
        - id
        - email
        - householdId
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
          example: parent@example.com
        householdId:
          type: string
          format: uuid
    ErrorMessage:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: Unauthorized
    FoodIconKey:
      type: string
      maxLength: 64
      description: >
        Starter illustration key (e.g. apple, sweet_potato) or a generated
        household key `custom_<slug>` derived from the food name (e.g.
        custom_cucumber). Clients render custom keys from the name (emoji when
        known, otherwise initials).
      pattern: "^([a-z0-9_]+|custom_[a-z0-9]+(?:_[a-z0-9]+){0,15})$"
      example: custom_cucumber
    FoodResponse:
      type: object
      required:
        - id
        - name
        - iconKey
        - system
        - sessionEligible
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Apples
        iconKey:
          $ref: "#/components/schemas/FoodIconKey"
        householdId:
          type: string
          format: uuid
          nullable: true
          description: Null for system starter foods
        system:
          type: boolean
          description: True when the food is a global starter (householdId is null)
        sessionEligible:
          type: boolean
          description: >
            When false, the food is a snack — visible in the catalog but not
            selectable for tasting Plan create/update. System starters are always true.
        liked:
          allOf:
            - $ref: "#/components/schemas/Liked"
          nullable: true
          description: Optional preference (often set for snacks)
        texture:
          allOf:
            - $ref: "#/components/schemas/Texture"
          nullable: true
          description: Optional preference (often set for snacks)
        tasteNote:
          type: string
          maxLength: 100
          nullable: true
          description: Optional free-text taste note (e.g. salt & vinegar); blank clears to null
        archivedAt:
          type: string
          format: date-time
          nullable: true
          description: Set when the household food is soft-archived; null when active
    CreateFoodRequest:
      type: object
      required:
        - name
        - iconKey
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          example: Extra apple mash
        iconKey:
          $ref: "#/components/schemas/FoodIconKey"
        sessionEligible:
          type: boolean
          default: true
          description: Set false to create a snack (not for tasting sessions)
        liked:
          allOf:
            - $ref: "#/components/schemas/Liked"
          nullable: true
        texture:
          allOf:
            - $ref: "#/components/schemas/Texture"
          nullable: true
        tasteNote:
          type: string
          maxLength: 100
          nullable: true
    UpdateFoodRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          example: Updated mash
        iconKey:
          $ref: "#/components/schemas/FoodIconKey"
        sessionEligible:
          type: boolean
          description: Omit to leave unchanged; false marks as snack
        liked:
          allOf:
            - $ref: "#/components/schemas/Liked"
          nullable: true
          description: Omit to leave unchanged
        texture:
          allOf:
            - $ref: "#/components/schemas/Texture"
          nullable: true
          description: Omit to leave unchanged
        tasteNote:
          type: string
          maxLength: 100
          nullable: true
          description: Omit to leave unchanged; blank string clears to null
      description: Omit a field to leave it unchanged
    Familiarity:
      type: string
      enum:
        - safe
        - familiar_but_new
        - truly_new
        - retrying
      description: How familiar the child is with this planned food
    SessionStatus:
      type: string
      enum:
        - planned
        - cancelled
        - completed
    Liked:
      type: string
      enum:
        - like
        - so_so
        - no
      description: Whether the child liked the food during the run
    Texture:
      type: string
      enum:
        - soft
        - crunchy
        - chewy
        - wet
    Temperature:
      type: string
      enum:
        - cold
        - warm
        - hot
    Smell:
      type: string
      enum:
        - like
        - so_so
        - no
      description: Whether the child liked how the food smelled (same scale as Liked)
    FoodOutcomeRequest:
      type: object
      required:
        - position
        - ateEnough
      properties:
        position:
          type: integer
          enum: [1, 2]
          description: Which planned food slot (1 or 2)
        liked:
          $ref: "#/components/schemas/Liked"
          nullable: true
        texture:
          $ref: "#/components/schemas/Texture"
          nullable: true
        temperature:
          $ref: "#/components/schemas/Temperature"
          nullable: true
        smell:
          $ref: "#/components/schemas/Smell"
          nullable: true
        whyNote:
          type: string
          maxLength: 500
          nullable: true
          description: Why the child liked or did not like the food (mic or typed)
        changeNote:
          type: string
          maxLength: 500
          nullable: true
          description: What could change to make the food more likable
        ateEnough:
          type: boolean
          description: Parent judgment — did the child eat enough of this food?
    CompleteSessionRequest:
      type: object
      required:
        - foods
      properties:
        foods:
          type: array
          minItems: 2
          maxItems: 2
          items:
            $ref: "#/components/schemas/FoodOutcomeRequest"
    SessionFoodRequest:
      type: object
      required:
        - foodId
        - familiarity
      properties:
        foodId:
          type: string
          format: uuid
          description: Must be a catalog food visible to this household and not archived
        familiarity:
          $ref: "#/components/schemas/Familiarity"
        variantNote:
          type: string
          maxLength: 200
          nullable: true
          description: >
            Optional free-text brand, variety, or prep note. Required (and must
            differ between the two slots, case-insensitive after trim) when both
            foods share the same `foodId`.
          example: Honeycrisp
    CreateSessionRequest:
      type: object
      required:
        - scheduledOn
        - foods
      properties:
        scheduledOn:
          type: string
          format: date
          description: >
            Calendar date for the tasting. Must be today or later. At most one
            planned or completed session per household may use a given date
            (cancelled sessions free the day).
          example: "2026-07-20"
        foods:
          type: array
          minItems: 2
          maxItems: 2
          items:
            $ref: "#/components/schemas/SessionFoodRequest"
    UpdateSessionRequest:
      type: object
      required:
        - scheduledOn
        - foods
      properties:
        scheduledOn:
          type: string
          format: date
          description: >
            Calendar date for the tasting. Must be today or later. Moving onto a
            day that already has another planned or completed session is
            rejected; cancelled does not occupy the day.
          example: "2026-07-22"
        foods:
          type: array
          minItems: 2
          maxItems: 2
          items:
            $ref: "#/components/schemas/SessionFoodRequest"
    SessionFoodResponse:
      type: object
      required:
        - foodId
        - name
        - iconKey
        - familiarity
        - position
      properties:
        foodId:
          type: string
          format: uuid
        name:
          type: string
          example: Apples
        iconKey:
          $ref: "#/components/schemas/FoodIconKey"
        familiarity:
          $ref: "#/components/schemas/Familiarity"
        variantNote:
          type: string
          maxLength: 200
          nullable: true
        position:
          type: integer
          enum: [1, 2]
        liked:
          $ref: "#/components/schemas/Liked"
          nullable: true
        texture:
          $ref: "#/components/schemas/Texture"
          nullable: true
        temperature:
          $ref: "#/components/schemas/Temperature"
          nullable: true
        smell:
          $ref: "#/components/schemas/Smell"
          nullable: true
        whyNote:
          type: string
          maxLength: 500
          nullable: true
        changeNote:
          type: string
          maxLength: 500
          nullable: true
        ateEnough:
          type: boolean
          nullable: true
          description: Set after the session is completed
    UpdateParentNoteRequest:
      type: object
      properties:
        parentNote:
          type: string
          maxLength: 2000
          nullable: true
          description: >
            Optional parent context after the tasting. Trimmed on save; blank
            or null clears the stored note.
    SessionResponse:
      type: object
      required:
        - id
        - scheduledOn
        - status
        - foods
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        scheduledOn:
          type: string
          format: date
          example: "2026-07-20"
        status:
          $ref: "#/components/schemas/SessionStatus"
        foods:
          type: array
          minItems: 2
          maxItems: 2
          items:
            $ref: "#/components/schemas/SessionFoodResponse"
        parentNote:
          type: string
          maxLength: 2000
          nullable: true
          description: Optional parent notes saved after the kid reward beat
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    InsightTip:
      type: object
      required:
        - id
        - message
      properties:
        id:
          type: string
          maxLength: 64
          example: keep_going
        message:
          type: string
          example: You're building a tasting rhythm — keep going at a calm pace.
    InsightsResponse:
      type: object
      required:
        - completedSessionCount
        - ready
        - ateEnoughYes
        - ateEnoughNo
        - likedLike
        - likedSoSo
        - likedNo
        - likedSkipped
        - topLikedTextures
        - familiaritySafe
        - familiarityFamiliarButNew
        - familiarityTrulyNew
        - snackCount
        - hasParentNotes
        - tips
      properties:
        completedSessionCount:
          type: integer
          minimum: 0
        ready:
          type: boolean
          description: True when completedSessionCount >= 3
        ateEnoughYes:
          type: integer
          minimum: 0
        ateEnoughNo:
          type: integer
          minimum: 0
        likedLike:
          type: integer
          minimum: 0
          description: Merged session outcomes + snack liked=like
        likedSoSo:
          type: integer
          minimum: 0
        likedNo:
          type: integer
          minimum: 0
        likedSkipped:
          type: integer
          minimum: 0
          description: Session outcomes with null liked only (snacks never skipped)
        topLikedTextures:
          type: array
          maxItems: 3
          items:
            type: string
            enum:
              - soft
              - crunchy
              - chewy
              - wet
          description: Texture names ranked by count among merged liked=like rows
        familiaritySafe:
          type: integer
          minimum: 0
        familiarityFamiliarButNew:
          type: integer
          minimum: 0
        familiarityTrulyNew:
          type: integer
          minimum: 0
        snackCount:
          type: integer
          minimum: 0
          description: Active (non-archived) snack foods for the household
        hasParentNotes:
          type: boolean
        tips:
          type: array
          maxItems: 3
          items:
            $ref: "#/components/schemas/InsightTip"
          description: Empty when not ready; otherwise 0–3 non-dismissed tips
