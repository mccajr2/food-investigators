openapi: 3.0.3
info:
  title: Quickapp API
  version: 0.8.0
  description: >
    Contract-first API for Food Investigators. Documents family-account auth
    (email/password register and login, Bearer session tokens, /api/auth/me),
    the household food catalog (system starters + custom foods, archive), and
    tasting sessions (create, list upcoming, history of completed, download
    history PDF, get, update, cancel, complete with run outcomes).
servers:
  - url: http://localhost:8080
    description: Local development
paths:
  /api/auth/register:
    post:
      operationId: register
      summary: Register a parent account and create a household
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            example:
              email: parent@example.com
              password: password1
              rememberMe: true
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
              example:
                message: Email already registered
  /api/auth/login:
    post:
      operationId: login
      summary: Sign in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              email: parent@example.com
              password: password1
              rememberMe: true
      responses:
        "200":
          description: Signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "401":
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
              example:
                message: Invalid email or password
  /api/auth/logout:
    post:
      operationId: logout
      summary: Invalidate the current Bearer session
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Signed out
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /api/auth/me:
    get:
      operationId: me
      summary: Return the current parent and household ids
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /api/foods:
    get:
      operationId: listFoods
      summary: List system starters plus this household's foods
      security:
        - bearerAuth: []
      parameters:
        - name: includeArchived
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: >
            When false (default), only active household foods are included with
            system starters. When true, archived household foods are included too.
      responses:
        "200":
          description: Foods for the current household
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FoodResponse"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
    post:
      operationId: createFood
      summary: Create a household food
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFoodRequest"
            example:
              name: Extra apple mash
              iconKey: apple
      responses:
        "201":
          description: Food created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoodResponse"
        "400":
          description: Invalid request or icon key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
              example:
                message: Invalid icon key
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "409":
          description: Name already used by a starter or active household food
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
              example:
                message: A food with that name already exists
  /api/foods/{foodId}:
    put:
      operationId: updateFood
      summary: Update a household food name and/or icon
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/FoodId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFoodRequest"
            example:
              name: Updated mash
              iconKey: sweet_potato
      responses:
        "200":
          description: Food updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoodResponse"
        "400":
          description: Invalid request or icon key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "403":
          description: System starter foods cannot be changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
              example:
                message: System starter foods cannot be changed
        "404":
          description: Food not found for this household
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "409":
          description: Name already used by a starter or active household food
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
              example:
                message: A food with that name already exists
  /api/foods/{foodId}/archive:
    post:
      operationId: archiveFood
      summary: Soft-archive a household food
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/FoodId"
      responses:
        "200":
          description: Food archived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoodResponse"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "403":
          description: System starter foods cannot be changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Food not found for this household
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /api/sessions:
    get:
      operationId: listUpcomingSessions
      summary: List planned tasting sessions for this household (earliest date first)
      description: >
        Returns sessions with status `planned`, ordered by `scheduledOn` ascending.
        Cancelled sessions are omitted.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Upcoming planned sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionResponse"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
    post:
      operationId: createSession
      summary: Create a planned tasting session with exactly two foods
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
            example:
              scheduledOn: "2026-07-20"
              foods:
                - foodId: aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaa04
                  familiarity: likes
                  variantNote: Honeycrisp
                - foodId: aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaa05
                  familiarity: truly_new
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "400":
          description: >
            Invalid request — wrong food count, missing familiarity, unknown or
            archived foods, or invalid familiarity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /api/sessions/history:
    get:
      operationId: listSessionHistory
      summary: List completed tasting sessions for this household (newest first)
      description: >
        Returns sessions with status `completed`, ordered by `scheduledOn`
        descending then `updatedAt` descending. Planned and cancelled sessions
        are omitted. Each item reuses `SessionResponse` including per-food
        run outcomes. Read-only — use get by id for a single completed session.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Completed session history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionResponse"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /api/sessions/history.pdf:
    get:
      operationId: exportSessionHistoryPdf
      summary: Download completed tasting history as a PDF
      description: >
        Returns a PDF packet of sessions with status `completed`, ordered by
        `scheduledOn` descending then `updatedAt` descending (same as history
        list). Optional `from` and `to` (ISO-8601 dates) filter inclusively on
        `scheduledOn`. Omit both for the full completed history. Empty filtered
        results still return 200 with a PDF that states no sessions matched.
        Packet header is generic (product title + generated date + range) —
        no parent email or household id. Planned and cancelled sessions are
        omitted.
      security:
        - bearerAuth: []
      parameters:
        - name: from
          in: query
          required: false
          description: Inclusive start date on scheduledOn (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: false
          description: Inclusive end date on scheduledOn (YYYY-MM-DD)
          schema:
            type: string
            format: date
      responses:
        "200":
          description: PDF tasting-history packet
          headers:
            Content-Disposition:
              description: Attachment filename for the PDF download
              schema:
                type: string
                example: attachment; filename="tasting-history.pdf"
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "400":
          description: >
            Invalid request — malformed date, or `from` after `to`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /api/sessions/{sessionId}:
    get:
      operationId: getSession
      summary: Get one tasting session for this household
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Session found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Session not found for this household
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
    put:
      operationId: updateSession
      summary: Update a still-planned tasting session
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSessionRequest"
            example:
              scheduledOn: "2026-07-22"
              foods:
                - foodId: aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaa05
                  familiarity: familiar_but_new
                  variantNote: "TJ's"
                - foodId: aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaa13
                  familiarity: likes
      responses:
        "200":
          description: Session updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "400":
          description: Invalid request or foods not selectable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Session not found for this household
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "409":
          description: Session is cancelled and cannot be edited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
              example:
                message: Session cannot be edited
  /api/sessions/{sessionId}/cancel:
    post:
      operationId: cancelSession
      summary: Soft-cancel a planned tasting session
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Session cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Session not found for this household
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "409":
          description: Session is already cancelled and cannot be edited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /api/sessions/{sessionId}/complete:
    post:
      operationId: completeSession
      summary: Record run outcomes for both foods and mark the session completed
      description: >
        Persists per-food run outcomes (icon prompts + optional notes) and sets
        session status to `completed`. Only allowed while the session is still
        `planned`. Completed sessions are omitted from the default upcoming list.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteSessionRequest"
            example:
              foods:
                - position: 1
                  liked: like
                  texture: crunchy
                  temperature: cold
                  smell: like
                  whyNote: crunchy
                  changeNote: less peel
                  ateEnough: true
                - position: 2
                  liked: no
                  texture: wet
                  temperature: warm
                  ateEnough: false
      responses:
        "200":
          description: Session completed with outcomes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "400":
          description: Invalid request or outcomes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Session not found for this household
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "409":
          description: Session is cancelled or already completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
              example:
                message: Session cannot be edited
components:
  parameters:
    FoodId:
      name: foodId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: Opaque server-side session token from register or login
  schemas:
    RegisterRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: parent@example.com
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 128
          example: password1
        rememberMe:
          type: boolean
          default: true
          description: >
            When true (default), session lasts 30 days and clients may persist the
            token. When false, session lasts 12 hours and clients must not persist
            across process death.
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: parent@example.com
        password:
          type: string
          format: password
          example: password1
        rememberMe:
          type: boolean
          default: true
          description: Same semantics as RegisterRequest.rememberMe
    AuthResponse:
      type: object
      required:
        - token
        - user
      properties:
        token:
          type: string
          description: Opaque Bearer token for subsequent authenticated calls
          example: "a1b2c3d4e5f6789012345678901234567890abcdef1234567890abcdef123456"
        user:
          $ref: "#/components/schemas/UserResponse"
    UserResponse:
      type: object
      required:
        - id
        - email
        - householdId
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
          example: parent@example.com
        householdId:
          type: string
          format: uuid
    ErrorMessage:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: Unauthorized
    FoodIconKey:
      type: string
      maxLength: 64
      description: >
        Starter illustration key (e.g. apple, sweet_potato) or a generated
        household key `custom_<slug>` derived from the food name (e.g.
        custom_cucumber). Clients render custom keys from the name (emoji when
        known, otherwise initials).
      pattern: "^([a-z0-9_]+|custom_[a-z0-9]+(?:_[a-z0-9]+){0,15})$"
      example: custom_cucumber
    FoodResponse:
      type: object
      required:
        - id
        - name
        - iconKey
        - system
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Apples
        iconKey:
          $ref: "#/components/schemas/FoodIconKey"
        householdId:
          type: string
          format: uuid
          nullable: true
          description: Null for system starter foods
        system:
          type: boolean
          description: True when the food is a global starter (householdId is null)
        archivedAt:
          type: string
          format: date-time
          nullable: true
          description: Set when the household food is soft-archived; null when active
    CreateFoodRequest:
      type: object
      required:
        - name
        - iconKey
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          example: Extra apple mash
        iconKey:
          $ref: "#/components/schemas/FoodIconKey"
    UpdateFoodRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          example: Updated mash
        iconKey:
          $ref: "#/components/schemas/FoodIconKey"
      description: Omit a field to leave it unchanged
    Familiarity:
      type: string
      enum:
        - likes
        - familiar_but_new
        - truly_new
      description: How familiar the child is with this planned food
    SessionStatus:
      type: string
      enum:
        - planned
        - cancelled
        - completed
    Liked:
      type: string
      enum:
        - like
        - so_so
        - no
      description: Whether the child liked the food during the run
    Texture:
      type: string
      enum:
        - soft
        - crunchy
        - chewy
        - wet
    Temperature:
      type: string
      enum:
        - cold
        - warm
        - hot
    Smell:
      type: string
      enum:
        - like
        - so_so
        - no
      description: Whether the child liked how the food smelled (same scale as Liked)
    FoodOutcomeRequest:
      type: object
      required:
        - position
        - ateEnough
      properties:
        position:
          type: integer
          enum: [1, 2]
          description: Which planned food slot (1 or 2)
        liked:
          $ref: "#/components/schemas/Liked"
          nullable: true
        texture:
          $ref: "#/components/schemas/Texture"
          nullable: true
        temperature:
          $ref: "#/components/schemas/Temperature"
          nullable: true
        smell:
          $ref: "#/components/schemas/Smell"
          nullable: true
        whyNote:
          type: string
          maxLength: 500
          nullable: true
          description: Why the child liked or did not like the food (mic or typed)
        changeNote:
          type: string
          maxLength: 500
          nullable: true
          description: What could change to make the food more likable
        ateEnough:
          type: boolean
          description: Parent judgment — did the child eat enough of this food?
    CompleteSessionRequest:
      type: object
      required:
        - foods
      properties:
        foods:
          type: array
          minItems: 2
          maxItems: 2
          items:
            $ref: "#/components/schemas/FoodOutcomeRequest"
    SessionFoodRequest:
      type: object
      required:
        - foodId
        - familiarity
      properties:
        foodId:
          type: string
          format: uuid
          description: Must be a catalog food visible to this household and not archived
        familiarity:
          $ref: "#/components/schemas/Familiarity"
        variantNote:
          type: string
          maxLength: 200
          nullable: true
          description: Optional free-text brand, variety, or prep note
          example: Honeycrisp
    CreateSessionRequest:
      type: object
      required:
        - scheduledOn
        - foods
      properties:
        scheduledOn:
          type: string
          format: date
          example: "2026-07-20"
        foods:
          type: array
          minItems: 2
          maxItems: 2
          items:
            $ref: "#/components/schemas/SessionFoodRequest"
    UpdateSessionRequest:
      type: object
      required:
        - scheduledOn
        - foods
      properties:
        scheduledOn:
          type: string
          format: date
          example: "2026-07-22"
        foods:
          type: array
          minItems: 2
          maxItems: 2
          items:
            $ref: "#/components/schemas/SessionFoodRequest"
    SessionFoodResponse:
      type: object
      required:
        - foodId
        - name
        - iconKey
        - familiarity
        - position
      properties:
        foodId:
          type: string
          format: uuid
        name:
          type: string
          example: Apples
        iconKey:
          $ref: "#/components/schemas/FoodIconKey"
        familiarity:
          $ref: "#/components/schemas/Familiarity"
        variantNote:
          type: string
          maxLength: 200
          nullable: true
        position:
          type: integer
          enum: [1, 2]
        liked:
          $ref: "#/components/schemas/Liked"
          nullable: true
        texture:
          $ref: "#/components/schemas/Texture"
          nullable: true
        temperature:
          $ref: "#/components/schemas/Temperature"
          nullable: true
        smell:
          $ref: "#/components/schemas/Smell"
          nullable: true
        whyNote:
          type: string
          maxLength: 500
          nullable: true
        changeNote:
          type: string
          maxLength: 500
          nullable: true
        ateEnough:
          type: boolean
          nullable: true
          description: Set after the session is completed
    SessionResponse:
      type: object
      required:
        - id
        - scheduledOn
        - status
        - foods
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        scheduledOn:
          type: string
          format: date
          example: "2026-07-20"
        status:
          $ref: "#/components/schemas/SessionStatus"
        foods:
          type: array
          minItems: 2
          maxItems: 2
          items:
            $ref: "#/components/schemas/SessionFoodResponse"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
